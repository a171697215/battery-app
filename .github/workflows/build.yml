name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache buildozer dependencies
        uses: actions/cache@v3
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev \
            cmake libffi-dev libssl-dev python3-dev \
            autoconf-archive automake

      - name: Fix libffi autogen for Android
        run: |
          # 创建符号链接，让 autoreconf 能找到 libtool 宏
          sudo ln -sf /usr/share/aclocal/libtool.m4 /usr/share/aclocal/lt~obsolete.m4
          sudo ln -sf /usr/share/aclocal/libtool.m4 /usr/share/aclocal/ltsugar.m4
          sudo ln -sf /usr/share/aclocal/libtool.m4 /usr/share/aclocal/ltversion.m4
          sudo ln -sf /usr/share/aclocal/libtool.m4 /usr/share/aclocal/ltoptions.m4
          # 设置环境变量
          echo "ACLOCAL_PATH=/usr/share/aclocal:/usr/share/autoconf-archive" >> $GITHUB_ENV

      - name: Install buildozer
        run: pip install buildozer

      - name: Build APK
        env:
          ANDROID_NDK_HOME: ${{ github.workspace }}/.buildozer/android/platform/android-ndk-r25c
          ACLOCAL_PATH: /usr/share/aclocal:/usr/share/autoconf-archive
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: battery-apk
          path: ${{ github.workspace }}/bin/*.apk
